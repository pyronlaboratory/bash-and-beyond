---
# roles/base/tasks/main.yml
# Basic server hardening and utility setup

- name: Update all packages to latest
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  tags: ["base", "update"]

- name: Install common utilities
  ansible.builtin.dnf:
    name:
      - wget
      - git
      - unzip
      - tar
      - vim
      - htop
      - net-tools
      - bind-utils
      - firewalld
      - python3
      - python3-pip
    state: present
  tags: ["base", "packages"]

- name: Install fail2ban
  ansible.builtin.dnf:
    name: fail2ban
    state: present
    enablerepo: epel
  ignore_errors: true
  tags: ["base", "fail2ban"]

- name: Configure fail2ban jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban
  tags: ["base", "fail2ban"]

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  ignore_errors: true
  tags: ["base", "fail2ban"]

- name: Enable and start firewalld
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
  tags: ["base", "firewall"]

- name: Allow SSH through firewall
  ansible.posix.firewalld:
    service: ssh
    permanent: true
    state: enabled
    immediate: true
  tags: ["base", "firewall"]

- name: Allow HTTP through firewall
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true
  tags: ["base", "firewall"]

- name: Allow HTTPS through firewall
  ansible.posix.firewalld:
    service: https
    permanent: true
    state: enabled
    immediate: true
  tags: ["base", "firewall"]

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC
  tags: ["base"]

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: Restart sshd
  tags: ["base", "hardening"]

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart sshd
  tags: ["base", "hardening"]
