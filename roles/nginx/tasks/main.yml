---
# roles/nginx/tasks/main.yml

- name: Install nginx
  ansible.builtin.dnf:
    name: nginx
    state: present
  tags: ["nginx"]

- name: Ensure /usr/share/nginx/html exists
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: directory
    owner: nginx
    group: nginx
    mode: "0755"
  tags: ["nginx"]

- name: Deploy nginx virtualhost config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/app.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: ["nginx"]

- name: Remove default nginx welcome page
  ansible.builtin.file:
    path: /usr/share/nginx/html/index.html
    state: absent
  ignore_errors: true
  tags: ["nginx"]

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
  tags: ["nginx"]

- name: Test nginx config is valid
  ansible.builtin.command: nginx -t
  changed_when: false
  tags: ["nginx"]
